<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1350">
  <title>Story Template</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --primary: {{primaryColor}};
      --secondary: {{secondaryColor}};
      --accent: {{accentColor}};
      --background: {{backgroundColor}};
      --text-color: {{textColor}};
    }

    /* ============================================================
       COVER SLIDE - Dark cinematic style
       ============================================================ */
    .cover {
      width: 1080px;
      height: 1350px;
      background: linear-gradient(160deg, #0d2b2f, var(--secondary), #0a1f22);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 100px 80px;
      position: relative;
      overflow: hidden;
    }

    /* Cover background image (from Pexels) */
    .cover .cover-bg-image {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-size: cover;
      background-position: center;
      z-index: 0;
    }

    /* Dark overlay for text readability over photo */
    .cover .cover-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg,
        rgba(23,54,60,0.3) 0%,
        rgba(23,54,60,0.55) 40%,
        rgba(23,54,60,0.85) 100%);
      z-index: 1;
    }

    /* Photo credit (bottom-right) */
    .cover .photo-credit {
      position: absolute;
      bottom: 20px;
      right: 30px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      z-index: 3;
      letter-spacing: 0.02em;
    }

    /* Subtle light leak effect */
    .cover .light-leak {
      position: absolute;
      top: 0;
      right: 0;
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse at top right, rgba({{primaryRgb}},0.2), transparent 70%);
    }
    .cover .light-leak-2 {
      position: absolute;
      bottom: -100px;
      left: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(ellipse, rgba({{accentRgb}},0.12), transparent 70%);
    }

    /* Top accent line */
    .cover .accent-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--primary), transparent);
    }

    /* Brand logo area */
    .cover .brand-area {
      position: absolute;
      top: 60px;
      left: 80px;
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 3;
    }
    .cover .brand-bar {
      width: 3px;
      height: 40px;
      background: var(--primary);
      border-radius: 2px;
    }
    .cover .brand-name {
      font-size: 22px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.05em;
    }

    .cover .cover-label {
      display: inline-block;
      padding: 8px 24px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 40px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 40px;
      position: relative;
      z-index: 2;
      letter-spacing: 0.05em;
    }

    .cover .emoji-area {
      font-size: 60px;
      margin-bottom: 48px;
      position: relative;
      z-index: 2;
    }

    .cover .cover-headline {
      font-size: 58px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.25;
      letter-spacing: -0.02em;
      word-break: keep-all;
      margin-bottom: 32px;
      position: relative;
      z-index: 2;
      max-width: 860px;
    }

    .cover .cover-subtext {
      font-size: 26px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.6;
      word-break: keep-all;
      position: relative;
      z-index: 2;
      max-width: 650px;
    }

    .cover .bottom-info {
      position: absolute;
      bottom: 60px;
      left: 80px;
      right: 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 2;
    }

    .cover .slide-indicator {
      font-size: 18px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.1em;
    }

    .cover .swipe-hint {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cover .swipe-arrow {
      display: inline-block;
      width: 40px;
      height: 1px;
      background: rgba(255, 255, 255, 0.3);
      position: relative;
    }
    .cover .swipe-arrow::after {
      content: '';
      position: absolute;
      right: 0;
      top: -3px;
      width: 8px;
      height: 8px;
      border-right: 1px solid rgba(255, 255, 255, 0.3);
      border-top: 1px solid rgba(255, 255, 255, 0.3);
      transform: rotate(45deg);
    }

    /* ============================================================
       CONTENT SLIDE - Dark editorial magazine style
       ============================================================ */
    .content {
      width: 1080px;
      height: 1350px;
      background: var(--secondary);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 100px 80px 80px 80px;
      position: relative;
      overflow: hidden;
    }

    /* Brand logo area */
    .content .brand-area {
      position: absolute;
      top: 60px;
      left: 80px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 3;
    }
    .content .brand-bar {
      width: 3px;
      height: 36px;
      background: var(--primary);
      border-radius: 2px;
      opacity: 0.6;
    }
    .content .brand-name {
      font-size: 20px;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.05em;
    }

    /* Subtle background gradient */
    .content .bg-gradient {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba({{primaryRgb}},0.05) 0%, transparent 50%, rgba({{accentRgb}},0.03) 100%);
    }

    /* Slide number - top right */
    .content .content-slide-num {
      position: absolute;
      top: 60px;
      right: 80px;
      font-size: 18px;
      font-weight: 500;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.1em;
    }

    /* Section headline (faded) */
    .content .content-headline {
      font-size: 38px;
      font-weight: 700;
      color: rgba(255,255,255,0.3);
      margin-bottom: 28px;
      word-break: keep-all;
      letter-spacing: -0.01em;
      position: relative;
      z-index: 2;
      max-width: 800px;
    }

    /* Quote area - centered with top accent bar */
    .content .quote-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      margin-bottom: 48px;
      position: relative;
      z-index: 2;
      max-width: 800px;
    }

    .content .quote-bar {
      width: 60px;
      height: 5px;
      border-radius: 3px;
      background: var(--primary);
      flex-shrink: 0;
    }

    .content .quote-text {
      font-size: 32px;
      font-weight: 500;
      color: rgba(255,255,255,0.9);
      line-height: 1.8;
      word-break: keep-all;
      text-align: center;
    }

    .content .highlight-inline {
      display: inline;
      background: var(--primary);
      color: #ffffff;
      padding: 4px 14px;
      border-radius: 6px;
      font-weight: 700;
    }

    /* Decorative elements */
    .content .deco-line-bottom {
      position: absolute;
      bottom: 80px;
      left: 80px;
      right: 80px;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }

    .content .page-marker {
      position: absolute;
      bottom: 50px;
      right: 80px;
      font-size: 16px;
      font-weight: 500;
      color: rgba(255,255,255,0.2);
    }

    /* Subtle background number */
    .content .bg-number {
      position: absolute;
      bottom: 60px;
      left: 60px;
      font-size: 260px;
      font-weight: 900;
      color: rgba(255,255,255,0.04);
      line-height: 1;
      letter-spacing: -0.05em;
    }

    /* ============================================================
       DESIGN TOKEN VARIANTS
       ============================================================ */

    .content.layout-centered {
      align-items: center;
      text-align: center;
      padding: 100px 80px;
    }
    .content.layout-centered .quote-area {
      flex-direction: column;
      align-items: center;
    }
    .content.layout-centered .quote-bar {
      width: 60px;
      height: 6px;
      align-self: center;
    }
    .content.layout-centered .quote-text {
      text-align: center;
      max-width: 750px;
    }
    .content.layout-centered .content-headline {
      text-align: center;
      max-width: 800px;
    }

    .content.layout-card {
      padding: 100px 80px;
      align-items: center;
    }
    .content.layout-card .card-inner {
      background: rgba(255,255,255,0.05);
      border-radius: 24px;
      padding: 56px 48px;
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
      max-width: 860px;
      width: 100%;
    }

    .content.bg-light-tint {
      background: linear-gradient(180deg, var(--secondary) 0%, #0d2b2f 100%);
    }
    .content.bg-subtle-gradient {
      background: linear-gradient(170deg, var(--secondary) 0%, #0a2328 100%);
    }
    .content.bg-accent-block-top::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 200px;
      background: linear-gradient(180deg, rgba({{primaryRgb}},0.12), transparent);
      z-index: 0;
    }

    .content.deco-minimal .bg-number { display: none; }
    .content.deco-minimal .deco-line-bottom { display: none; }
    .content.deco-rich .bg-number { opacity: 0.08; }

    /* ============================================================
       CTA SLIDE
       ============================================================ */
    .cta {
      width: 1080px;
      height: 1350px;
      background: linear-gradient(160deg, #0d2b2f, var(--secondary), #0a1f22);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 100px 80px;
      position: relative;
      overflow: hidden;
    }

    .cta .top-accent {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent), transparent);
    }

    .cta .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(ellipse, rgba({{primaryRgb}},0.08), transparent 70%);
    }

    .cta .emoji-area {
      font-size: 64px;
      margin-bottom: 40px;
      position: relative;
      z-index: 2;
    }

    .cta .cta-headline {
      font-size: 56px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.25;
      word-break: keep-all;
      margin-bottom: 28px;
      position: relative;
      z-index: 2;
      max-width: 850px;
    }

    .cta .cta-divider {
      width: 60px;
      height: 3px;
      background: var(--primary);
      border-radius: 2px;
      margin-bottom: 28px;
      position: relative;
      z-index: 2;
    }

    .cta .cta-body {
      font-size: 28px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.7;
      word-break: keep-all;
      margin-bottom: 20px;
      position: relative;
      z-index: 2;
      max-width: 650px;
    }

    .cta .cta-subtext {
      font-size: 24px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.4);
      position: relative;
      z-index: 2;
    }

    .cta .brand-logo {
      position: absolute;
      bottom: 60px;
      right: 80px;
      z-index: 2;
    }
    .cta .brand-logo-text {
      font-size: 36px;
      font-weight: 800;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.08em;
      line-height: 1.1;
    }
  </style>
</head>
<body>

  <!-- COVER SLIDE -->
  <div class="cover" id="slide-cover">
    <div class="cover-bg-image" id="cover-bg"></div>
    <div class="cover-overlay" id="cover-overlay"></div>

    <div class="accent-bar"></div>
    <div class="light-leak"></div>
    <div class="light-leak-2"></div>

    <div class="brand-area">
      <div class="brand-bar"></div>
      <span class="brand-name"></span>
    </div>

    <div class="cover-label">STORY</div>
    <div class="emoji-area">{{emoji}}</div>
    <h1 class="cover-headline">{{headline}}</h1>
    <p class="cover-subtext">{{subtext}}</p>

    <div class="bottom-info">
      <span class="slide-indicator">01 / {{totalSlides}}</span>
      <span class="swipe-hint">
        밀어서 계속 읽기
        <span class="swipe-arrow"></span>
      </span>
    </div>

    <span class="photo-credit" id="photo-credit"></span>
  </div>

  <!-- CONTENT SLIDE -->
  <div class="content {{layoutVariant}} {{backgroundStyle}} {{decoClass}}" id="slide-content" style="display:none;">
    <div class="bg-gradient"></div>

    <div class="brand-area">
      <div class="brand-bar"></div>
      <span class="brand-name"></span>
    </div>

    <div class="content-slide-num">{{slideNumber}} / {{totalSlides}}</div>
    <div class="bg-number">{{slideNumber}}</div>

    <h3 class="content-headline">{{headline}}</h3>
    <div class="quote-area">
      <div class="quote-bar"></div>
      <div class="quote-text">
        {{body}}
        <span class="highlight-inline" id="highlight-inline" style="display:none;">{{highlight}}</span>
      </div>
    </div>

    <div class="deco-line-bottom"></div>
    <div class="page-marker">{{slideNumber}} of {{totalSlides}}</div>
  </div>

  <!-- CTA SLIDE -->
  <div class="cta" id="slide-cta" style="display:none;">
    <div class="top-accent"></div>
    <div class="glow"></div>

    <div class="emoji-area">{{emoji}}</div>
    <h2 class="cta-headline">{{headline}}</h2>
    <div class="cta-divider"></div>
    <p class="cta-body">{{body}}</p>
    <p class="cta-subtext">{{subtext}}</p>

    <div class="brand-logo">
      <div class="brand-logo-text"></div>
    </div>
  </div>

  <script>
    (function() {
      var slideNumber = parseInt('{{slideNumber}}', 10);
      var totalSlides = parseInt('{{totalSlides}}', 10);

      var cover = document.getElementById('slide-cover');
      var content = document.getElementById('slide-content');
      var cta = document.getElementById('slide-cta');

      cover.style.display = 'none';
      content.style.display = 'none';
      cta.style.display = 'none';

      if (slideNumber === 1) {
        cover.style.display = 'flex';
        // Apply cover background image if available
        var hasCoverImage = '{{hasCoverImage}}';
        if (hasCoverImage === 'true') {
          document.getElementById('cover-bg').style.backgroundImage = 'url({{coverImageUrl}})';
          document.getElementById('photo-credit').textContent = 'Photo by {{photographerName}} / Pexels';
        } else {
          document.getElementById('cover-overlay').style.display = 'none';
        }
      } else if (slideNumber === totalSlides) {
        cta.style.display = 'flex';
      } else {
        content.style.display = 'flex';
        var highlightText = '{{highlight}}';
        if (highlightText && highlightText !== '' && highlightText !== '{{' + 'highlight}}') {
          document.getElementById('highlight-inline').style.display = 'inline';
        }
      }
    })();
  </script>
</body>
</html>
